    <style>
        /* Base Layout */

        .scroll-container {
            position: relative;
            display: block;
            overflow: clip;
            min-height: 100vh;
        }

        #contentBuffer {
            position: relative;
            content: "";
            height: 100dvh;
        }

        .hero-section {
            width: 100%;
            height: 100%;
            min-height: 100vh; 
            bottom: 0;
            position: relative;
            display: grid;
            place-items: center;
            z-index: 8;
        }

        .hero-container {
            text-align: center;
            z-index: 10;
            width: 95vw;
            margin: 0;
            text-transform: none;
            border: 1px solid var(--lcd-glow-color);
            box-shadow: 0 0 1px 1px rgba(0, 0, 0, 0.5); 
            padding: 1.5rem 2rem;
            background-color: var(--bg-main);
            position: fixed;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            animation: 
                glitchLoad 6s ease-in-out none 1;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        .hero-title {
            color: var(--hed-colour);
            font: var(--h1-styles);
            font-family: var(--hed-type);
            font-weight: 900;
            text-transform: uppercase; 
            letter-spacing: calc(var(--hed-letterspace) + 1px);
            position: absolute;
            top: 0;
            left: 0;
            font-size: 6em;
        }

        .hero-container > span {
            font: var(--font-body);
            font-size: var(--font-body);
            text-transform: none;
            letter-spacing: initial;
            font-style: italic;
            color: #fff;
            mix-blend-mode: difference;
        }

        .hero-section p {
            display: inline-block;
            font: var(--font-detail);
            text-align: end;
            padding: 0px;
            color: var(--hed-colour);
        }

        /*Hero Glitch Animation*/

        @keyframes glitchLoad {
        50% {
            -webkit-filter: url(#glitchHover); 
            filter: url(#glitchHover);
        }
        }
        
        @keyframes glitchRepeat {
            0%, 100% { filter: none; }
            50% { filter: url(#glitchHover); }
        }

        .is-flickering {
            animation: glitchRepeat 1s linear infinite;
        }

         /*Transcripts*/

        #transcript-btn {
            max-width: 600px;
            margin: auto;
            padding: 0px;
            display: flex;
            flex-direction: row-reverse;
            text-align: right;
            position: fixed;
            top: 0;
            left: 0;
            transform: translate(24%, 115%);
        }

        @media (min-width: 595px) {
            .hero-container {
                width: unset;
                max-width: 80vw;
            }
        }


    </style>
</head>

        <svg style="position: absolute; width: 0; height: 0; overflow: hidden;" aria-hidden="true">
            <filter id="pixelNoise" x="0" y="0">
                <!-- Block -->
                <feFlood x="4" y="4" height="1" width="1"/>
                <!-- 2. Grid Size -->
                <feComposite width="5" height="5"/>
                <!-- Point Name-->
                <feTile result="a"/>
                <!-- Map the original gradient colors onto these tiles -->
                <feComposite in="SourceGraphic" in2="a" operator="in"/>
                <!-- Expand the tiny points to fill the tile size -->
                <feMorphology operator="dilate" radius="2.5"/>

                <!-- ADD THIS TO BOOST CONTRAST

                <feFuncR type="gamma" amplitude="1.2" exponent="2" offset="-0.1"/>
                <feFuncG type="gamma" amplitude="1.2" exponent="2" offset="-0.1"/>
